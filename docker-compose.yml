version: "3.9"

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://flightclaim:${DB_PASS}@db:5432/flightclaim
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS_HASH: ${ADMIN_PASS_HASH}
      COMPANY_NAME: ${COMPANY_NAME:-FlightClaim AB}
      COMPANY_REG: ${COMPANY_REG:-XXXXXX-XXXX}
      COMPANY_ADDRESS: ${COMPANY_ADDRESS:-Storgatan 1, 123 45 Stockholm}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      NOTIFY_EMAIL: ${NOTIFY_EMAIL:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: flightclaim
      POSTGRES_USER: flightclaim
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flightclaim"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
